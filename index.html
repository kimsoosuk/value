<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>김수석의 생각 뒤집기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <style>
    /* ===== Reset & Base ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      -webkit-text-size-adjust: 100%;
      font-size: 16px
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      line-height: 1.6;
      min-height: 100dvh;
      overflow-x: hidden
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none
    }

    textarea {
      font-family: inherit;
      border: none;
      outline: none
    }

    img {
      display: block;
      max-width: 100%
    }

    /* ===== Utility ===== */
    .hidden {
      display: none !important
    }

    .fade-in {
      animation: fadeIn .4s ease
    }

    .slide-up {
      animation: slideUp .45s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-4px)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* ===== Step 0: 홈 ===== */
    .home {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #f8fafc
    }

    .home-header {
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      position: relative;
      z-index: 10
    }

    .home-header .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: .5rem
    }

    .home-header .logo img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      border: 2px solid #f1f5f9
    }

    .home-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -.02em
    }

    .home-header .subtitle {
      color: #64748b;
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      line-height: 1.5
    }

    .mode-cards {
      display: flex;
      gap: 1rem;
      max-width: 40rem;
      margin: 0 auto;
      width: 100%
    }

    .mode-card {
      flex: 1;
      padding: 1.25rem;
      border-radius: 1rem;
      border: 2px solid #e2e8f0;
      background: #fff;
      text-align: left;
      transition: all .25s;
      position: relative;
      overflow: hidden
    }

    .mode-card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06)
    }

    .mode-card.active-low {
      background: #eff6ff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px #3b82f6
    }

    .mode-card.active-high {
      background: #f0fdf4;
      border-color: #22c55e;
      box-shadow: 0 0 0 1px #22c55e
    }

    .mode-card .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .75rem;
      background: #f1f5f9;
      color: #64748b;
      transition: all .25s
    }

    .mode-card.active-low .icon-wrap {
      background: #3b82f6;
      color: #fff
    }

    .mode-card.active-high .icon-wrap {
      background: #22c55e;
      color: #fff
    }

    .mode-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: .35rem;
      color: #1e293b
    }

    .mode-card.active-low h3 {
      color: #1d4ed8
    }

    .mode-card.active-high h3 {
      color: #15803d
    }

    .mode-card p {
      font-size: .78rem;
      color: #64748b;
      line-height: 1.55
    }

    .mode-card.active-low p {
      color: #3b82f6
    }

    .mode-card.active-high p {
      color: #16a34a
    }

    /* Value Grid */
    .value-area {
      flex: 1;
      overflow-y: auto;
      transition: all .4s;
      padding: 0
    }

    .value-area.collapsed {
      max-height: 0;
      opacity: 0;
      overflow: hidden
    }

    .value-area-inner {
      max-width: 72rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem
    }

    .cat-filters {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      position: sticky;
      top: 0;
      background: #f8fafc;
      padding: .75rem 0;
      z-index: 5
    }

    .cat-btn {
      padding: .55rem 1rem;
      border-radius: 2rem;
      font-size: .8rem;
      font-weight: 600;
      background: #fff;
      color: #64748b;
      border: 1px solid #e2e8f0;
      transition: all .2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .03)
    }

    .cat-btn.active {
      background: #1e293b;
      color: #fff;
      border-color: #1e293b
    }

    .value-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: .75rem
    }

    @media(min-width:640px) {
      .value-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem
      }
    }

    @media(min-width:1024px) {
      .value-grid {
        grid-template-columns: repeat(4, 1fr)
      }
    }

    .value-card {
      background: #fff;
      padding: 1.25rem;
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
      text-align: left;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .value-card:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, .06);
      border-color: #93c5fd
    }

    .value-card:active {
      transform: scale(.97)
    }

    .value-card .bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: 0 4px 4px 0
    }

    .value-card .cat-label {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: .15rem .5rem;
      border-radius: .35rem;
      display: inline-block;
      margin-bottom: .5rem;
      width: fit-content
    }

    .value-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: .75rem;
      flex: 1
    }

    .value-card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      margin-top: auto
    }

    .value-card .tag {
      font-size: .65rem;
      color: #64748b;
      background: #f1f5f9;
      padding: .2rem .5rem;
      border-radius: .35rem;
      font-weight: 500
    }

    /* Category colors */
    .cat-thinking {
      background: #eff6ff;
      color: #2563eb;
      border-color: #bfdbfe
    }

    .bar-thinking {
      background: #3b82f6
    }

    .cat-emotional {
      background: #fef2f2;
      color: #dc2626;
      border-color: #fecaca
    }

    .bar-emotional {
      background: #ef4444
    }

    .cat-social {
      background: #f5f3ff;
      color: #7c3aed;
      border-color: #ddd6fe
    }

    .bar-social {
      background: #8b5cf6
    }

    .cat-harmonious {
      background: #f0fdf4;
      color: #16a34a;
      border-color: #bbf7d0
    }

    .bar-harmonious {
      background: #22c55e
    }

    /* ===== App Shell (Step 1~6) ===== */
    .app-shell {
      position: fixed;
      inset: 0;
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    @media(min-width:640px) {
      .app-shell {
        padding: 1.5rem
      }
    }

    .app-container {
      width: 100%;
      max-width: 32rem;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, .1)
    }

    @media(min-width:640px) {
      .app-container {
        border-radius: 1.5rem;
        height: 85vh
      }
    }

    .app-header {
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(12px);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
      z-index: 20
    }

    .app-header .back-btn {
      padding: .5rem;
      margin-left: -.5rem;
      border-radius: 50%;
      color: #94a3b8;
      transition: background .15s
    }

    .app-header .back-btn:hover {
      background: #f1f5f9
    }

    .app-header .profile {
      display: flex;
      align-items: center;
      gap: .6rem
    }

    .app-header .profile img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
      border: 1px solid #f1f5f9
    }

    .app-header .profile h2 {
      font-size: .95rem;
      font-weight: 700;
      color: #1e293b
    }

    .app-header .profile .status {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .7rem;
      color: #64748b;
      font-weight: 500
    }

    .app-header .profile .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%
    }

    .dot-low {
      background: #3b82f6
    }

    .dot-high {
      background: #22c55e
    }

    /* ===== Step 1, 5: 입력 카드 ===== */
    .input-step {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc
    }

    .input-card {
      background: #fff;
      padding: 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
      border: 1px solid #e2e8f0;
      max-width: 24rem;
      width: 100%
    }

    .input-card .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem
    }

    .input-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: .5rem
    }

    .input-card h2 .hl {
      color: #2563eb
    }

    .input-card .desc {
      font-size: .82rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.25rem
    }

    .input-card textarea {
      width: 100%;
      height: 8rem;
      padding: 1rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: .75rem;
      resize: none;
      font-size: .9rem;
      color: #334155;
      transition: border .2s, box-shadow .2s
    }

    .input-card textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .12)
    }

    .submit-btn {
      width: 100%;
      margin-top: 1rem;
      padding: .9rem;
      border-radius: .75rem;
      font-size: .9rem;
      font-weight: 700;
      color: #fff;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      transition: background .2s
    }

    .submit-btn:hover:not(:disabled) {
      background: #334155
    }

    .submit-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed
    }

    /* ===== Step 2: 공식 정의 ===== */
    .define-step {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .define-step .hint {
      font-size: .82rem;
      font-weight: 600;
      color: #64748b;
      text-align: center;
      margin-bottom: 1.5rem
    }

    .sentence-card {
      background: #fff;
      padding: 1.25rem;
      border-radius: 1rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .03);
      border: 1px solid #e2e8f0;
      margin-bottom: .75rem;
      max-width: 28rem;
      width: 100%
    }

    .sentence-card p {
      color: #1e293b;
      font-weight: 500;
      line-height: 1.7
    }

    .next-btn {
      margin-top: 1.5rem;
      padding: .75rem 1.5rem;
      border-radius: 2rem;
      font-size: .85rem;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: background .2s;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .04)
    }

    .next-btn:hover {
      background: #bfdbfe
    }

    /* ===== Step 3: 3가지 질문 ===== */
    .questions-step {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      background: #f8fafc
    }

    .questions-step h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: .5rem
    }

    .questions-step h2 .badge {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1e293b;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 700
    }

    .q-card {
      background: #fff;
      padding: 1.25rem;
      border-radius: 1rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .03);
      border: 1px solid #e2e8f0;
      margin-bottom: 1rem
    }

    .q-card p {
      font-size: .82rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: .75rem;
      word-break: keep-all
    }

    .q-card textarea {
      width: 100%;
      height: 5rem;
      padding: .75rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: .5rem;
      resize: none;
      font-size: .85rem;
      color: #334155;
      transition: border .2s
    }

    .q-card textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, .1)
    }

    .q-submit {
      padding: 2rem 0
    }

    /* ===== Step 4: 채팅 ===== */
    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      gap: 1rem
    }

    .chat-badge {
      display: flex;
      justify-content: center;
      padding: 1rem 0
    }

    .chat-badge-inner {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      padding: .5rem 1.5rem;
      text-align: center;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .03)
    }

    .chat-badge-inner .mode-label {
      font-size: .6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    .chat-badge-inner h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e293b
    }

    .msg-row {
      display: flex;
      max-width: 100%
    }

    .msg-row.user {
      justify-content: flex-end
    }

    .msg-row.model {
      justify-content: flex-start
    }

    .msg-row .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: .5rem;
      margin-top: 4px;
      flex-shrink: 0;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .06);
      object-fit: cover
    }

    .msg-bubble {
      max-width: 80%;
      padding: .75rem 1rem;
      border-radius: 1.25rem;
      font-size: .9rem;
      line-height: 1.65;
      word-break: break-word;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04)
    }

    .msg-row.user .msg-bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px
    }

    .msg-row.model .msg-bubble {
      background: #fff;
      color: #334155;
      border: 1px solid #f1f5f9;
      border-top-left-radius: 4px
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce .6s infinite
    }

    .typing-dots span:nth-child(2) {
      animation-delay: .1s
    }

    .typing-dots span:nth-child(3) {
      animation-delay: .2s
    }

    .finish-chat-btn {
      align-self: center;
      margin: 1.5rem 0;
      padding: .85rem 2rem;
      border-radius: 2rem;
      font-size: .9rem;
      font-weight: 700;
      background: #1e293b;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: all .2s
    }

    .finish-chat-btn:hover {
      background: #334155;
      transform: scale(1.02)
    }

    /* Chat input bar */
    .chat-input-bar {
      padding: .75rem;
      background: #fff;
      border-top: 1px solid #f1f5f9;
      z-index: 20;
      flex-shrink: 0
    }

    .chat-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 .5rem .35rem;
      font-size: .7rem;
      font-weight: 500
    }

    .chat-progress .label {
      color: #94a3b8
    }

    .chat-progress .count {
      color: #3b82f6;
      font-weight: 700
    }

    .chat-progress .count.full {
      color: #ef4444
    }

    .chat-input-wrap {
      display: flex;
      align-items: flex-end;
      gap: .5rem;
      background: #f8fafc;
      padding: .35rem;
      border-radius: 1.5rem;
      border: 1px solid #e2e8f0;
      transition: box-shadow .2s
    }

    .chat-input-wrap:focus-within {
      box-shadow: 0 0 0 2px rgba(59, 130, 246, .1)
    }

    .chat-input-wrap textarea {
      flex: 1;
      background: transparent;
      border: none;
      resize: none;
      padding: .65rem 1rem;
      min-height: 44px;
      max-height: 128px;
      font-size: .9rem;
      color: #1e293b;
      line-height: 1.5
    }

    .chat-input-wrap textarea::placeholder {
      color: #94a3b8
    }

    .chat-input-wrap textarea:disabled {
      opacity: .5
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #2563eb;
      flex-shrink: 0;
      transition: background .15s;
      box-shadow: 0 2px 6px rgba(37, 99, 235, .25)
    }

    .send-btn:hover:not(:disabled) {
      background: #1d4ed8
    }

    .send-btn:disabled {
      background: #cbd5e1;
      box-shadow: none
    }

    .send-btn svg.spin {
      animation: spin .8s linear infinite
    }

    /* ===== Step 6: 총평 ===== */
    .summary-step {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 6rem;
      background: #f1f5f9
    }

    .summary-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding: 0 .25rem
    }

    .summary-nav .back-btn2 {
      color: #94a3b8;
      background: none;
      padding: .25rem;
      transition: color .15s
    }

    .summary-nav .back-btn2:hover {
      color: #1e293b
    }

    .summary-nav .reset-btn {
      font-size: .8rem;
      font-weight: 700;
      color: #64748b;
      background: #fff;
      padding: .5rem 1rem;
      border-radius: 2rem;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      transition: color .15s
    }

    .summary-nav .reset-btn:hover {
      color: #1e293b
    }

    .summary-card {
      background: #fff;
      padding: 1.5rem;
      border-radius: 1.5rem;

        .replace(/\n/g, '<br>');
    }

    // --- 메인 렌더 ---
    const $app = document.getElementById('app');

    function render() {
      switch (state.step) {
        case 0: return renderHome();
        case 1: return renderStep1();
        case 2: return renderStep2();
        case 3: return renderStep3();
        case 4: return renderStep4();
        case 5: return renderStep5();
        case 6: return renderStep6();
      }
    }

    // ====== Step 0: 홈 ======
    function renderHome() {
      const filtered = state.mode
        ? (state.catFilter === 'ALL' ? VALUES : VALUES.filter(v => v.category === state.catFilter))
        : [];

      $app.innerHTML = `
    <div class="home">
      <header class="home-header">
        <div class="logo">
          <img src="${TEACHER_IMG}" crossOrigin="anonymous" alt="김수석">
          <h1>김수석의 생각 뒤집기</h1>
        </div>
        <p class="subtitle">나를 움직이는 가치관, 한 번도 이렇게 들여다본 적 없을걸?</p>
        <div class="mode-cards">
          <button class="mode-card ${state.mode === 'LOW' ? 'active-low' : ''}" data-mode="LOW">
            <div class="icon-wrap">${ICONS.search}</div>
            <h3>좀 먼 가치관</h3>
            <p>나랑은 좀 안 맞다고 느꼈던 것.<br>근데 정말 그럴까? 한 번 가까이 가보자.</p>
          </button>
          <button class="mode-card ${state.mode === 'HIGH' ? 'active-high' : ''}" data-mode="HIGH">
            <div class="icon-wrap">${ICONS.scale}</div>
            <h3>제일 나다운 가치관</h3>
            <p>나에게 가장 중요한 것.<br>혹시 너무 꽉 쥐고 있진 않았을까?</p>
          </button>
        </div>
      </header>
      <div class="value-area ${state.mode ? '' : 'collapsed'}">
        <div class="value-area-inner">
          <div class="cat-filters">
            <button class="cat-btn ${state.catFilter === 'ALL' ? 'active' : ''}" data-cat="ALL">전체</button>
            ${Object.entries(CATEGORIES).map(([k, v]) =>
        `<button class="cat-btn ${state.catFilter === k ? 'active' : ''}" data-cat="${k}">${v.name}</button>`
      ).join('')}
          </div>
          <div class="value-grid">
            ${filtered.map(v => {
        const c = CATEGORIES[v.category];
        return `<button class="value-card" data-vid="${v.id}">
                <div class="bar ${c.bar}"></div>
                <span class="cat-label ${c.color}">${c.name}</span>
                <h3>${v.name}</h3>
                <div class="tags">${v.keywords.map(k => `<span class="tag">#${k}</span>`).join('')}</div>
              </button>`;
      }).join('')}
          </div>
        </div>
      </div>
    </div>`;

      // 이벤트
      $app.querySelectorAll('[data-mode]').forEach(btn => {
        btn.onclick = () => setState({ mode: btn.dataset.mode, catFilter: 'ALL' });
      });
      $app.querySelectorAll('[data-cat]').forEach(btn => {
        btn.onclick = () => setState({ catFilter: btn.dataset.cat });
      });
      $app.querySelectorAll('[data-vid]').forEach(btn => {
        btn.onclick = () => {
          const v = VALUES.find(x => x.id === +btn.dataset.vid);
          setState({ selectedValue: v, step: 1 });
        };
      });
    }

    // ====== App Shell 래퍼 ======
    function appShell(content, opts = {}) {
      const v = state.selectedValue;
      const modeLabel = state.mode === 'LOW' ? '좀 먼 가치관' : '제일 나다운 가치관';
      const dotClass = state.mode === 'LOW' ? 'dot-low' : 'dot-high';

      const header = opts.hideHeader ? '' : `
    <div class="app-header">
      <div style="display:flex;align-items:center;gap:.5rem">
        <button class="back-btn" id="globalBack">${ICONS.arrowLeft}</button>
        <div class="profile">
          <img src="${TEACHER_IMG}" crossOrigin="anonymous" alt="김수석">
          <div>
            <h2>김수석 선생님</h2>
            <div class="status"><span class="dot ${dotClass}"></span>${modeLabel} · ${v?.name || ''}</div>
          </div>
        </div>
      </div>
    </div>`;

      $app.innerHTML = `
    <div class="app-shell">
      <div class="app-container">
        ${header}
        ${content}
      </div>
    </div>`;

      const backBtn = document.getElementById('globalBack');
      if (backBtn) backBtn.onclick = resetApp;
    }

    function resetApp() {
      state = {
        step: 0, mode: null, catFilter: 'ALL', selectedValue: null,
        userDefinition: '', sentences: [], revealedCount: 1, threeAnswers: ['', '', ''],
        chatHistory: [], chatTurnCount: 0, isChatFinished: false, isTyping: false,
        userInput: '', finalReflection: '', finalSummary: '', isGeneratingSummary: false,
      };
      render();
    }

    // ====== Step 1: 나의 정의 ======
    function renderStep1() {
      const v = state.selectedValue;
      appShell(`
    <div class="input-step">
      <div class="input-card slide-up">
        <div class="icon-circle" style="background:#dbeafe;color:#2563eb">${ICONS.search}</div>
        <h2>나에게 <span class="hl">'${v.name}'</span>${josa(v.name, '이란/란')}?</h2>
        <p class="desc">정답은 없어요. 이 단어를 들었을 때 머릿속에 떠오르는 나만의 정의나 생각을 자유롭게 적어보세요.</p>
        <textarea id="defInput" placeholder="예: 나에게 ${v.name}${josa(v.name, '이란/란')}...">${state.userDefinition}</textarea>
        <button class="submit-btn" id="defSubmit">작성 완료 ${ICONS.chevronRight}</button>
      </div>
    </div>`);

      const input = document.getElementById('defInput');
      const btn = document.getElementById('defSubmit');
      input.oninput = () => { state.userDefinition = input.value; btn.disabled = !input.value.trim(); };
      btn.disabled = !state.userDefinition.trim();
      btn.onclick = () => {
        if (!state.userDefinition.trim()) return;
        const sents = state.selectedValue.definition.match(/[^.?!]+[.?!]+/g) || [state.selectedValue.definition];
        setState({ sentences: sents, revealedCount: 1, step: 2 });
      };
    }

    // ====== Step 2: 공식 정의 ======
    function renderStep2() {
      const isLast = state.revealedCount >= state.sentences.length;
      appShell(`
    <div class="define-step">
      <p class="hint">이 가치를 중요하게 생각하는 사람들은 보통 이런 특징을 가지고 있어요.</p>
      ${state.sentences.slice(0, state.revealedCount).map((s, i) =>
        `<div class="sentence-card slide-up" style="animation-delay:${i * 100}ms"><p>${s.trim()}</p></div>`
      ).join('')}
      <button class="next-btn" id="nextSentBtn">${isLast ? '생각 넓히기 시작' : '다음 문장 읽기'} ${ICONS.chevronRight}</button>
    </div>`);

      document.getElementById('nextSentBtn').onclick = () => {
        if (state.revealedCount < state.sentences.length) {
          setState({ revealedCount: state.revealedCount + 1 });
        } else {
          setState({ step: 3 });
        }
      };
    }

    // ====== Step 3: 3가지 질문 ======
    function renderStep3() {
      const qs = QUESTIONS[state.mode];
      appShell(`
    <div class="questions-step">
      <h2><span class="badge">?</span> 내 마음 들여다보기</h2>
      ${qs.map((q, i) => `
        <div class="q-card slide-up" style="animation-delay:${i * 120}ms">
          <p>${i + 1}. ${q}</p>
          <textarea data-qi="${i}" placeholder="편안하게 적어주세요.">${state.threeAnswers[i]}</textarea>
        </div>`).join('')}
      <div class="q-submit">
        <button class="submit-btn" id="qSubmit">김수석 선생님과 대화하기 ${ICONS.send}</button>
      </div>
    </div>`);

      $app.querySelectorAll('[data-qi]').forEach(ta => {
        ta.oninput = () => { state.threeAnswers[+ta.dataset.qi] = ta.value; updateQBtn(); };
      });
      const qBtn = document.getElementById('qSubmit');
      function updateQBtn() { qBtn.disabled = state.threeAnswers.some(a => !a.trim()); }
      updateQBtn();
      qBtn.onclick = () => {
        if (state.threeAnswers.some(a => !a.trim())) return;
        setState({ step: 4 });
        startChat();
      };
    }

    // ====== Step 4: 채팅 ======
    async function startChat() {
      state.isTyping = true;
      render();
      try {
        const data = await apiCall({
          type: 'start',
          mode: state.mode,
          valueName: state.selectedValue.name,
          userDefinition: state.userDefinition,
          threeAnswers: state.threeAnswers,
        });
        state.chatHistory = [{ role: 'model', text: data.text }];
      } catch (e) {
        state.chatHistory = [{ role: 'model', text: '네트워크가 불안하네. 새로고침 후 다시 시도해줄래?' }];
      }
      state.isTyping = false;
      render();
      scrollChat();
    }

    async function sendMessage() {
      const msg = state.userInput.trim();
      if (!msg || state.chatTurnCount >= 7 || state.isTyping) return;
      const turn = state.chatTurnCount + 1;
      state.chatHistory.push({ role: 'user', text: msg });
      state.userInput = '';
      state.chatTurnCount = turn;
      state.isTyping = true;
      render();
      scrollChat();

      try {
        const data = await apiCall({
          type: 'continue',
          history: state.chatHistory,
          userMessage: msg,
          turnCount: turn,
        });
        state.chatHistory.push({ role: 'model', text: data.text });
        if (turn === 7) state.isChatFinished = true;
      } catch (e) {
        state.chatHistory.push({ role: 'model', text: '앗, 통신에 문제가 생겼어. 다시 말해줄래?' });
        state.chatTurnCount = turn - 1;
      }
      state.isTyping = false;
      render();
      scrollChat();
    }

    function scrollChat() {
      requestAnimationFrame(() => {
        const el = document.getElementById('chatScroll');
        if (el) el.scrollTop = el.scrollHeight;
      });
    }

    function renderStep4() {
      const v = state.selectedValue;
      const modeColor = state.mode === 'LOW' ? 'color:#3b82f6' : 'color:#22c55e';
      const modeLabel = state.mode === 'LOW' ? '좀 먼 가치관' : '제일 나다운 가치관';

      let messagesHtml = `
    <div class="chat-badge"><div class="chat-badge-inner">
      <div class="mode-label" style="${modeColor}">${modeLabel}</div>
      <h3>${v.name}</h3>
    </div></div>`;

      state.chatHistory.forEach((m, i) => {
        const isModel = m.role === 'model';
        const avatar = isModel && i > 0 ? `<img class="avatar" src="${TEACHER_IMG}" crossOrigin="anonymous" alt="T">` : '';
        messagesHtml += `<div class="msg-row ${m.role} fade-in">${avatar}<div class="msg-bubble">${renderMd(m.text)}</div></div>`;
      });

      if (state.isTyping) {
        messagesHtml += `<div class="msg-row model"><img class="avatar" src="${TEACHER_IMG}" crossOrigin="anonymous" alt="T"><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
      }

      if (state.isChatFinished && !state.isTyping) {
        messagesHtml += `<button class="finish-chat-btn fade-in" id="goStep5">마지막 생각 정리하기 ${ICONS.chevronRight}</button>`;
      }

      const inputDisabled = state.isChatFinished || state.isTyping;
      const sendDisabled = !state.userInput.trim() || inputDisabled;
      const countClass = state.chatTurnCount >= 7 ? 'count full' : 'count';

      appShell(`
    <div class="chat-body" id="chatScroll">${messagesHtml}</div>
    <div class="chat-input-bar">
      <div class="chat-progress">
        <span class="label">대화 진행도</span>
        <span class="${countClass}">${state.chatTurnCount} / 7</span>
      </div>
      <div class="chat-input-wrap">
        <textarea id="chatInput" rows="1" placeholder="${state.isChatFinished ? '대화가 종료되었습니다.' : '답변을 입력해주세요...'}" ${inputDisabled ? 'disabled' : ''}>${state.userInput}</textarea>
        <button class="send-btn" id="sendBtn" ${sendDisabled ? 'disabled' : ''}>${state.isTyping ? ICONS.loader : ICONS.send}</button>
      </div>
    </div>`);

      // 이벤트
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      chatInput.oninput = () => {
        state.userInput = chatInput.value;
        sendBtn.disabled = !chatInput.value.trim() || state.isChatFinished || state.isTyping;
      };
      chatInput.onkeydown = (e) => {
        if (e.isComposing) return;
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      };
      sendBtn.onclick = sendMessage;

      const goBtn = document.getElementById('goStep5');
      if (goBtn) goBtn.onclick = () => setState({ step: 5 });

      scrollChat();
    }

    // ====== Step 5: 마지막 성찰 ======
    function renderStep5() {
      const v = state.selectedValue;
      const prompt = state.mode === 'LOW'
        ? `평소 너에게 중요하지 않았던 이 가치관(${v.name})${josa(v.name, '을/를')} 삶에 들이게 된다면, 앞으로 어떤 일들이 펼쳐질까?`
        : `너에게 너무나도 중요했던 이 가치관(${v.name})${josa(v.name, '을/를')} 조금만 내려놓는다면, 너에게 어떤 여유나 변화가 생길까?`;

      appShell(`
    <div class="input-step">
      <div class="input-card slide-up">
        <h2>마지막으로 생각을 정리해볼까?</h2>
        <p class="desc">나와 대화를 나누며 <span style="font-weight:700;color:#2563eb">'${v.name}'</span>에 대한 생각이 어떻게 변했는지 자유롭게 적어봐.<br><br>${prompt}</p>
        <textarea id="reflInput" placeholder="마음이 가는 대로 솔직하게 적어줘.">${state.finalReflection}</textarea>
        <button class="submit-btn" id="reflSubmit">최종 총평 확인하기 ${ICONS.chevronRight}</button>
      </div>
    </div>`);

      const input = document.getElementById('reflInput');
      const btn = document.getElementById('reflSubmit');
      input.oninput = () => { state.finalReflection = input.value; btn.disabled = !input.value.trim(); };
      btn.disabled = !state.finalReflection.trim();
      btn.onclick = () => {
        if (!state.finalReflection.trim()) return;
        setState({ step: 6, isGeneratingSummary: true });
        generateSummary();
      };
    }

    // ====== Step 6: 총평 ======
    async function generateSummary() {
      try {
        const chatLog = state.chatHistory.map(m => `${m.role === 'user' ? '학생' : '멘토'}: ${m.text}`).join('\n');
        const data = await apiCall({
          type: 'summary',
          mode: state.mode,
          valueName: state.selectedValue.name,
          userDefinition: state.userDefinition,
          threeAnswers: state.threeAnswers,
          chatLog,
          finalReflection: state.finalReflection,
        });
        state.finalSummary = data.text;
      } catch (e) {
        state.finalSummary = '네트워크 오류로 총평을 불러오지 못했습니다. 다시 시도해주세요.';
      }
      state.isGeneratingSummary = false;
      render();
    }

    function renderStep6() {
      const v = state.selectedValue;

      if (state.isGeneratingSummary) {
        appShell(`<div class="loading-screen"><div class="spinner"></div><p>너만의 철학이 담긴 총평을 작성하고 있어...</p></div>`, { hideHeader: true });
        return;
      }

      appShell(`
    <div class="summary-step">
      <div class="summary-nav">
        <button class="back-btn2" id="sumBack">${ICONS.arrowLeft}</button>
        <button class="reset-btn" id="sumReset">처음으로</button>
      </div>
      <div class="summary-card" id="summaryCapture">
        <div class="deco-tr"></div>
        <div class="deco-bl"></div>
        <div class="header">
          <img src="${TEACHER_IMG}" crossOrigin="anonymous" alt="김수석">
          <div>
            <div class="label">김수석의 생각 뒤집기</div>
            <div class="title">나만의 <span class="hl">'${v.name}'</span> 이야기</div>
          </div>
        </div>
        <div class="summary-body">${renderMd(state.finalSummary)}</div>
        <div class="footer">${ICONS.check} <span>나를 움직이는 가치관, 한 번도 이렇게 들여다본 적 없을걸?</span></div>
      </div>
      <button class="download-btn" id="downloadBtn">${ICONS.download} 이미지로 저장하기</button>
    </div>`, { hideHeader: true });

      document.getElementById('sumBack').onclick = () => setState({ step: 5 });
      document.getElementById('sumReset').onclick = resetApp;
      document.getElementById('downloadBtn').onclick = handleDownload;
    }

    async function handleDownload() {
      const el = document.getElementById('summaryCapture');
      if (!el || !window.html2canvas) return;
      try {
        const canvas = await html2canvas(el, {
          scale: 2, backgroundColor: '#ffffff', useCORS: true, allowTaint: true,
          windowHeight: el.scrollHeight,
        });
        const link = document.createElement('a');
        link.download = `가치관상담소_총평_${state.selectedValue.name}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        alert('이미지 저장에 실패했습니다. 다시 시도해주세요.');
      }
    }

    // --- 초기 렌더 ---
    render();
  </script>
</body>

</html>
